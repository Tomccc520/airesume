<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="400" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="300" height="4" fill="#00d4ff"/>
  
  <!-- 头像区域 -->
  <rect x="20" y="20" width="50" height="50" fill="#f0f9ff" rx="4" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="45" cy="45" r="18" fill="#e0f2fe"/>
  
  <!-- 姓名 -->
  <rect x="85" y="25" width="120" height="12" fill="#0f172a" rx="2"/>
  <rect x="85" y="43" width="80" height="6" fill="#475569" rx="1"/>
  
  <!-- 联系信息 -->
  <rect x="85" y="58" width="60" height="4" fill="#00d4ff" rx="1"/>
  <rect x="150" y="58" width="55" height="4" fill="#7c3aed" rx="1"/>
  <rect x="210" y="58" width="65" height="4" fill="#00ff88" rx="1"/>
  
  <!-- 工作经历标题 -->
  <rect x="20" y="90" width="4" height="12" fill="#00d4ff"/>
  <rect x="30" y="92" width="70" height="8" fill="#0f172a" rx="1"/>
  
  <!-- 工作经历内容 -->
  <rect x="20" y="115" width="180" height="6" fill="#0f172a" rx="1"/>
  <rect x="220" y="115" width="50" height="5" fill="#475569" rx="1"/>
  <rect x="20" y="127" width="250" height="4" fill="#64748b" rx="1"/>
  <rect x="20" y="137" width="230" height="4" fill="#64748b" rx="1"/>
  <rect x="20" y="147" width="200" height="4" fill="#64748b" rx="1"/>
  
  <!-- 第二个工作经历 -->
  <rect x="20" y="165" width="160" height="6" fill="#0f172a" rx="1"/>
  <rect x="200" y="165" width="50" height="5" fill="#475569" rx="1"/>
  <rect x="20" y="177" width="240" height="4" fill="#64748b" rx="1"/>
  <rect x="20" y="187" width="220" height="4" fill="#64748b" rx="1"/>
  
  <!-- 技能标题 -->
  <rect x="20" y="210" width="4" height="12" fill="#7c3aed"/>
  <rect x="30" y="212" width="40" height="8" fill="#0f172a" rx="1"/>
  
  <!-- 技能标签 -->
  <rect x="20" y="232" width="55" height="18" fill="#f0f9ff" rx="9" stroke="#00d4ff" stroke-width="1"/>
  <rect x="80" y="232" width="65" height="18" fill="#faf5ff" rx="9" stroke="#7c3aed" stroke-width="1"/>
  <rect x="150" y="232" width="50" height="18" fill="#f0fdf4" rx="9" stroke="#00ff88" stroke-width="1"/>
  <rect x="205" y="232" width="60" height="18" fill="#f0f9ff" rx="9" stroke="#00d4ff" stroke-width="1"/>
  <rect x="20" y="255" width="60" height="18" fill="#faf5ff" rx="9" stroke="#7c3aed" stroke-width="1"/>
  <rect x="85" y="255" width="55" height="18" fill="#f0fdf4" rx="9" stroke="#00ff88" stroke-width="1"/>
  
  <!-- 项目经验标题 -->
  <rect x="20" y="290" width="4" height="12" fill="#00ff88"/>
  <rect x="30" y="292" width="60" height="8" fill="#0f172a" rx="1"/>
  
  <!-- 项目经验内容 -->
  <rect x="20" y="315" width="150" height="6" fill="#0f172a" rx="1"/>
  <rect x="20" y="327" width="250" height="4" fill="#64748b" rx="1"/>
  <rect x="20" y="337" width="230" height="4" fill="#64748b" rx="1"/>
  
  <!-- 底部装饰线 -->
  <rect x="0" y="396" width="300" height="4" fill="#00d4ff"/>
</svg>
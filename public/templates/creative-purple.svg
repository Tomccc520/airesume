<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="400" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- 左上角紫色装饰 -->
  <path d="M0,0 L120,0 L0,120 Z" fill="#8b5cf6"/>
  
  <!-- 右下角紫色装饰 -->
  <path d="M300,400 L180,400 L300,280 Z" fill="#8b5cf6" opacity="0.3"/>
  
  <!-- 头像区域 -->
  <circle cx="60" cy="60" r="30" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
  
  <!-- 姓名 -->
  <rect x="110" y="40" width="120" height="12" fill="#1f2937" rx="2"/>
  <rect x="110" y="58" width="80" height="8" fill="#8b5cf6" rx="2"/>
  
  <!-- 联系信息 -->
  <rect x="110" y="80" width="90" height="5" fill="#6b7280" rx="1"/>
  <rect x="110" y="90" width="85" height="5" fill="#6b7280" rx="1"/>
  <rect x="110" y="100" width="95" height="5" fill="#6b7280" rx="1"/>
  
  <!-- 个人简介区域 -->
  <rect x="30" y="130" width="240" height="1" fill="#8b5cf6"/>
  <rect x="30" y="140" width="80" height="8" fill="#8b5cf6" rx="2"/>
  
  <rect x="30" y="160" width="220" height="4" fill="#1f2937" rx="1"/>
  <rect x="30" y="170" width="200" height="4" fill="#1f2937" rx="1"/>
  <rect x="30" y="180" width="180" height="4" fill="#1f2937" rx="1"/>
  
  <!-- 工作经历区域 -->
  <rect x="30" y="205" width="240" height="1" fill="#8b5cf6"/>
  <rect x="30" y="215" width="70" height="8" fill="#8b5cf6" rx="2"/>
  
  <!-- 工作经历项目1 -->
  <circle cx="40" cy="240" r="3" fill="#8b5cf6"/>
  <rect x="50" y="235" width="140" height="6" fill="#1f2937" rx="1"/>
  <rect x="50" y="247" width="100" height="4" fill="#6b7280" rx="1"/>
  <rect x="50" y="257" width="180" height="4" fill="#6b7280" rx="1"/>
  <rect x="50" y="267" width="160" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 工作经历项目2 -->
  <circle cx="40" cy="285" r="3" fill="#8b5cf6"/>
  <rect x="50" y="280" width="130" height="6" fill="#1f2937" rx="1"/>
  <rect x="50" y="292" width="90" height="4" fill="#6b7280" rx="1"/>
  <rect x="50" y="302" width="170" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 技能区域 -->
  <rect x="30" y="325" width="240" height="1" fill="#8b5cf6"/>
  <rect x="30" y="335" width="40" height="8" fill="#8b5cf6" rx="2"/>
  
  <!-- 技能标签 -->
  <rect x="30" y="355" width="45" height="20" fill="#8b5cf6" opacity="0.1" rx="10"/>
  <rect x="35" y="360" width="35" height="4" fill="#8b5cf6" rx="1"/>
  <rect x="35" y="366" width="25" height="4" fill="#8b5cf6" rx="1"/>
  
  <rect x="85" y="355" width="50" height="20" fill="#8b5cf6" opacity="0.1" rx="10"/>
  <rect x="90" y="360" width="40" height="4" fill="#8b5cf6" rx="1"/>
  <rect x="90" y="366" width="30" height="4" fill="#8b5cf6" rx="1"/>
  
  <rect x="145" y="355" width="55" height="20" fill="#8b5cf6" opacity="0.1" rx="10"/>
  <rect x="150" y="360" width="45" height="4" fill="#8b5cf6" rx="1"/>
  <rect x="150" y="366" width="35" height="4" fill="#8b5cf6" rx="1"/>
</svg>
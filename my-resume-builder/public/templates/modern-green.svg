<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="400" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- 左侧绿色区域 -->
  <rect x="0" y="0" width="100" height="400" fill="#10b981"/>
  
  <!-- 头像区域 -->
  <circle cx="50" cy="60" r="25" fill="#ffffff" opacity="0.9"/>
  
  <!-- 姓名 -->
  <rect x="110" y="30" width="120" height="12" fill="#1f2937" rx="2"/>
  <rect x="110" y="48" width="80" height="8" fill="#6b7280" rx="2"/>
  
  <!-- 联系信息 -->
  <rect x="15" y="120" width="70" height="4" fill="#ffffff" opacity="0.8" rx="1"/>
  <rect x="15" y="130" width="60" height="4" fill="#ffffff" opacity="0.8" rx="1"/>
  <rect x="15" y="140" width="65" height="4" fill="#ffffff" opacity="0.8" rx="1"/>
  
  <!-- 技能标题 -->
  <rect x="15" y="170" width="40" height="6" fill="#ffffff" rx="1"/>
  
  <!-- 技能列表 -->
  <rect x="15" y="185" width="50" height="3" fill="#ffffff" opacity="0.7" rx="1"/>

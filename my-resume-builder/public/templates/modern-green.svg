  <rect x="15" y="205" width="55" height="3" fill="#ffffff" opacity="0.7" rx="1"/>
  
  <!-- 工作经历标题 -->
  <rect x="110" y="80" width="60" height="8" fill="#10b981" rx="2"/>
  
  <!-- 工作经历内容 -->
  <rect x="110" y="100" width="150" height="6" fill="#1f2937" rx="1"/>
  <rect x="110" y="112" width="120" height="4" fill="#6b7280" rx="1"/>
  <rect x="110" y="122" width="140" height="4" fill="#6b7280" rx="1"/>
  <rect x="110" y="132" width="100" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 第二个工作经历 -->
  <rect x="110" y="155" width="140" height="6" fill="#1f2937" rx="1"/>
  <rect x="110" y="167" width="110" height="4" fill="#6b7280" rx="1"/>
  <rect x="110" y="177" width="130" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 教育背景标题 -->
  <rect x="110" y="200" width="50" height="8" fill="#10b981" rx="2"/>
  
  <!-- 教育背景内容 -->
  <rect x="110" y="220" width="120" height="6" fill="#1f2937" rx="1"/>
  <rect x="110" y="232" width="90" height="4" fill="#6b7280" rx="1"/>
  <rect x="110" y="242" width="100" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 项目经验标题 -->
  <rect x="110" y="265" width="60" height="8" fill="#10b981" rx="2"/>
  
  <!-- 项目经验内容 -->
  <rect x="110" y="285" width="130" height="6" fill="#1f2937" rx="1"/>
  <rect x="110" y="297" width="160" height="4" fill="#6b7280" rx="1"/>
  <rect x="110" y="307" width="140" height="4" fill="#6b7280" rx="1"/>

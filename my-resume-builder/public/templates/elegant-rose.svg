  <!-- 工作经历标题 -->
  <rect x="30" y="175" width="70" height="8" fill="#f43f5e" rx="2"/>
  
  <!-- 工作经历项目1 -->
  <rect x="30" y="195" width="140" height="6" fill="#1f2937" rx="1"/>
  <rect x="180" y="195" width="60" height="5" fill="#9ca3af" rx="1"/>
  <rect x="30" y="207" width="100" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="217" width="200" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="227" width="180" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="237" width="160" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 工作经历项目2 -->
  <rect x="30" y="255" width="130" height="6" fill="#1f2937" rx="1"/>
  <rect x="170" y="255" width="55" height="5" fill="#9ca3af" rx="1"/>
  <rect x="30" y="267" width="90" height="4" fill="#6b7280" rx="1"/>

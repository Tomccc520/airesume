  <rect x="30" y="330" width="140" height="6" fill="#1f2937" rx="1"/>
  <rect x="180" y="330" width="50" height="5" fill="#9ca3af" rx="1"/>
  <rect x="30" y="342" width="100" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="352" width="120" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 技能标题 -->
  <rect x="30" y="375" width="40" height="8" fill="#f43f5e" rx="2"/>
  
  <!-- 技能标签 -->
  <rect x="80" y="375" width="45" height="6" fill="#f43f5e" opacity="0.1" rx="3"/>
  <rect x="85" y="377" width="35" height="2" fill="#f43f5e" rx="1"/>
  
  <rect x="135" y="375" width="50" height="6" fill="#f43f5e" opacity="0.1" rx="3"/>
  <rect x="140" y="377" width="40" height="2" fill="#f43f5e" rx="1"/>
  
  <rect x="195" y="375" width="55" height="6" fill="#f43f5e" opacity="0.1" rx="3"/>
  <rect x="200" y="377" width="45" height="2" fill="#f43f5e" rx="1"/>
  

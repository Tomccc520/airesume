<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="400" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- 顶部深蓝色区域 -->
  <rect x="0" y="0" width="300" height="100" fill="#1e3a8a"/>
  
  <!-- 姓名 -->
  <rect x="30" y="30" width="160" height="16" fill="#ffffff" rx="2"/>
  
  <!-- 职位 -->
  <rect x="30" y="55" width="100" height="10" fill="#ffffff" opacity="0.8" rx="2"/>
  
  <!-- 联系信息 -->
  <rect x="30" y="75" width="80" height="6" fill="#ffffff" opacity="0.7" rx="1"/>
  <rect x="120" y="75" width="75" height="6" fill="#ffffff" opacity="0.7" rx="1"/>
  <rect x="205" y="75" width="65" height="6" fill="#ffffff" opacity="0.7" rx="1"/>
  
  <!-- 左侧内容区域 -->
  <!-- 个人简介 -->
  <rect x="30" y="120" width="80" height="8" fill="#1e3a8a" rx="2"/>
  <rect x="30" y="140" width="160" height="4" fill="#1f2937" rx="1"/>
  <rect x="30" y="150" width="150" height="4" fill="#1f2937" rx="1"/>
  <rect x="30" y="160" width="140" height="4" fill="#1f2937" rx="1"/>
  
  <!-- 工作经历 -->
  <rect x="30" y="185" width="70" height="8" fill="#1e3a8a" rx="2"/>
  
  <rect x="30" y="205" width="120" height="6" fill="#1f2937" rx="1"/>
  <rect x="30" y="217" width="90" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="227" width="140" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="237" width="130" height="4" fill="#6b7280" rx="1"/>
  
  <rect x="30" y="255" width="110" height="6" fill="#1f2937" rx="1"/>
  <rect x="30" y="267" width="85" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="277" width="135" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 教育背景 -->
  <rect x="30" y="300" width="60" height="8" fill="#1e3a8a" rx="2"/>
  
  <rect x="30" y="320" width="130" height="6" fill="#1f2937" rx="1"/>
  <rect x="30" y="332" width="100" height="4" fill="#6b7280" rx="1"/>
  <rect x="30" y="342" width="110" height="4" fill="#6b7280" rx="1"/>
  
  <!-- 右侧边栏 -->
  <rect x="210" y="120" width="60" height="260" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- 技能标题 -->
  <rect x="220" y="135" width="40" height="6" fill="#1e3a8a" rx="1"/>
  
  <!-- 技能列表 -->
  <rect x="220" y="150" width="35" height="4" fill="#1f2937" rx="1"/>
  <rect x="220" y="160" width="30" height="4" fill="#1f2937" rx="1"/>
  <rect x="220" y="170" width="40" height="4" fill="#1f2937" rx="1"/>
  <rect x="220" y="180" width="25" height="4" fill="#1f2937" rx="1"/>
  
  <!-- 语言标题 -->
  <rect x="220" y="205" width="30" height="6" fill="#1e3a8a" rx="1"/>
  
  <!-- 语言列表 -->
  <rect x="220" y="220" width="25" height="4" fill="#1f2937" rx="1"/>
  <rect x="220" y="230" width="35" height="4" fill="#1f2937" rx="1"/>
  
  <!-- 证书标题 -->
  <rect x="220" y="255" width="30" height="6" fill="#1e3a8a" rx="1"/>
  
  <!-- 证书列表 -->
  <rect x="220" y="270" width="40" height="4" fill="#1f2937" rx="1"/>
  <rect x="220" y="280" width="35" height="4" fill="#1f2937" rx="1"/>
</svg>